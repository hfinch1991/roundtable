<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圆桌研讨会</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d0d1a;
  color: #c8c8d0;
  font-family: "Noto Serif SC", Georgia, "Times New Roman", serif;
  line-height: 1.8;
  font-size: 18px;
  min-height: 100vh;
}

.page {
  max-width: 900px;
  margin: 0 auto;
  padding: 80px 32px;
}

/* Header */
.site-header {
  text-align: center;
  margin-bottom: 80px;
}

.site-logo {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, #e94560, #8e44ad);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
  font-size: 28px;
  color: white;
  font-weight: bold;
}

.site-title {
  font-size: 40px;
  font-weight: 700;
  color: #f0f0f0;
  margin-bottom: 12px;
  letter-spacing: 2px;
}

.site-desc {
  font-size: 17px;
  color: #888;
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.8;
}

/* Discussion list */
.section-label {
  font-size: 13px;
  color: #e94560;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.discussion-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.discussion-card {
  display: block;
  padding: 28px 32px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.04);
  border-radius: 12px;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.3s, background 0.3s, transform 0.2s;
}

.discussion-card:hover {
  border-color: rgba(233, 69, 96, 0.3);
  background: rgba(255, 255, 255, 0.03);
  transform: translateY(-2px);
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
  font-size: 14px;
  color: #666;
}

.card-date {
  color: #888;
}

.card-rounds {
  padding: 2px 10px;
  border-radius: 10px;
  background: rgba(233, 69, 96, 0.1);
  color: #e94560;
  font-size: 12px;
}

.card-title {
  font-size: 24px;
  font-weight: 600;
  color: #f0f0f0;
  margin-bottom: 10px;
  line-height: 1.4;
}

.card-summary {
  font-size: 16px;
  color: #999;
  line-height: 1.7;
  margin-bottom: 16px;
}

.card-participants {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.card-tag {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.04);
  font-size: 13px;
  color: #a0a0b0;
}

.card-tag-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Footer */
.site-footer {
  margin-top: 80px;
  padding-top: 32px;
  border-top: 1px solid rgba(255, 255, 255, 0.04);
  text-align: center;
  font-size: 14px;
  color: #555;
}

.site-footer a {
  color: #888;
  text-decoration: none;
}

.site-footer a:hover {
  color: #e94560;
}

/* Responsive */
@media (max-width: 768px) {
  body { font-size: 16px; }
  .page { padding: 48px 16px; }
  .site-header { margin-bottom: 48px; }
  .site-logo { width: 52px; height: 52px; font-size: 24px; }
  .site-title { font-size: 28px; }
  .site-desc { font-size: 15px; }
  .section-label { font-size: 12px; }
  .discussion-card { padding: 20px; }
  .card-title { font-size: 20px; }
  .card-summary { font-size: 14px; }
  .card-tag { font-size: 12px; }
  .card-meta { font-size: 13px; }
  .site-footer { font-size: 13px; }
}
</style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="site-header">
    <div class="site-logo">桌</div>
    <h1 class="site-title">圆桌研讨会</h1>
    <p class="site-desc">邀请代表不同思想的典型人物，围绕一个议题展开以"求真"为目标的深度对话。由 AI 主持，人类提问。</p>
  </div>

  <!-- Discussion list -->
  <div class="section-label">全部讨论</div>

  <div class="discussion-list">

    <a class="discussion-card" href="ai-programming.html">
      <div class="card-meta">
        <span class="card-date">2026年3月29日</span>
        <span class="card-rounds">七轮对话</span>
      </div>
      <div class="card-title">AI 编程对普通 IT 工作者的影响</div>
      <div class="card-summary">从经济结构到认知能力、从权力分配到存在意义，五位思想家围绕 AI 编程对普通 IT 工作者的冲击展开七轮深度交锋，最终为一位运维工程师画出了具体的行动路线图。</div>
      <div class="card-participants">
        <span class="card-tag"><span class="card-tag-dot" style="background:#c0392b;"></span>马克思</span>
        <span class="card-tag"><span class="card-tag-dot" style="background:#2980b9;"></span>德鲁克</span>
        <span class="card-tag"><span class="card-tag-dot" style="background:#27ae60;"></span>李开复</span>
        <span class="card-tag"><span class="card-tag-dot" style="background:#8e44ad;"></span>克劳福德</span>
        <span class="card-tag"><span class="card-tag-dot" style="background:#d35400;"></span>毛泽东</span>
      </div>
    </a>

  </div>

  <!-- Footer -->
  <div class="site-footer">
    Powered by <a href="https://github.com/hfinch1991/roundtable">圆桌研讨会框架</a>
  </div>

</div>

</body>
</html>
